<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Signup App</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: Arial, sans-serif;
        padding: 20px;
        background: #f5f5f5;
        color: #333;
      }
      h1 {
        font-size: 1.4em;
        margin-bottom: 1.2rem;
        color: #222;
      }

      /* Grid */
      .grid-wrapper {
        overflow-x: auto;
      }
      table {
        border-collapse: collapse;
        width: 100%;
        min-width: 400px;
        background: white;
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
        table-layout: fixed;
      }
      th {
        background: #f0f0f0;
        padding: 10px 14px;
        font-size: 13px;
        font-weight: 600;
        text-align: center;
        border: 1px solid #e0e0e0;
        position: sticky;
        top: 0;
        z-index: 2;
      }
      th.time-header {
        text-align: left;
        min-width: 80px;
      }
      td {
        padding: 8px 10px;
        border: 1px solid #e0e0e0;
        vertical-align: top;
      }
      td.time-cell {
        font-size: 12px;
        font-weight: 600;
        color: #666;
        white-space: normal;
        background: #fafafa;
        min-width: 80px;
        word-break: break-word;
        position: sticky;
        left: 0;
        z-index: 1;
      }
      td.desc-cell {
        font-size: 11px;
        font-weight: 400;
        color: #666;
        max-width: 120px;
        width: 120px;
        word-wrap: break-word;
        overflow-wrap: break-word;
        white-space: normal;
        background: #fafafa;
      }

      .slot {
        border-radius: 6px;
        padding: 7px 9px;
        cursor: pointer;
      }
      .slot:hover {
        opacity: 0.85;
      }
      .slot-empty {
        background: none;
        cursor: default;
      }
      .slot-all-full {
        background: #f0f0f0;
        cursor: pointer;
      }

      .role-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 3px;
      }
      .role-row:last-child {
        margin-bottom: 0;
      }
      .role-label {
        font-size: 10px;
        color: #444;
      }
      .role-count {
        font-size: 10px;
        font-weight: 600;
      }
      .role-divider {
        border: none;
        border-top: 1px solid rgba(0, 0, 0, 0.08);
        margin: 3px 0;
      }
      .slot-names {
        font-size: 10px;
        margin-top: 4px;
        padding-top: 4px;
        border-top: 1px solid rgba(0, 0, 0, 0.08);
        line-height: 1.6;
      }

      /* Role colours */
      .color-general {
        background: #e8f5e9;
      }
      .color-classrep {
        background: #fff8e1;
      }
      .color-committee {
        background: #e3f2fd;
      }
      .count-general {
        color: #2e7d32;
      }
      .count-classrep {
        color: #f57f17;
      }
      .count-committee {
        color: #1565c0;
      }
      .count-full {
        color: #bbb;
      }
      .slot-mixed {
        background: #f9f9f9;
      }
      /* Modal */
      .modal-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.45);
        z-index: 1000;
      }
      .modal-overlay.active {
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .modal {
        background: white;
        border-radius: 12px;
        padding: 24px;
        width: 90%;
        max-width: 380px;
      }
      .modal-title {
        font-size: 15px;
        font-weight: 600;
        margin-bottom: 4px;
      }
      .modal-subtitle {
        font-size: 12px;
        color: #888;
        margin-bottom: 16px;
      }

      .role-buttons {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 16px;
      }
      .role-btn {
        padding: 10px 14px;
        border-radius: 8px;
        border: 2px solid transparent;
        cursor: pointer;
        text-align: left;
        font-size: 13px;
        font-weight: 500;
        transition: opacity 0.15s;
      }
      .role-btn:hover {
        opacity: 0.85;
      }
      .role-btn.selected {
        border-color: #333;
      }
      .role-btn-full {
        opacity: 0.45;
        cursor: not-allowed;
      }
      .role-btn-general {
        background: #e8f5e9;
        color: #2e7d32;
      }
      .role-btn-classrep {
        background: #fff8e1;
        color: #f57f17;
      }
      .role-btn-committee {
        background: #e3f2fd;
        color: #1565c0;
      }
      .role-btn-label {
        font-size: 13px;
        font-weight: 600;
      }
      .role-btn-count {
        font-size: 11px;
        font-weight: 400;
        margin-top: 1px;
        opacity: 0.8;
      }

      .modal-form {
        display: none;
      }
      .modal-form.visible {
        display: block;
      }
      .modal input {
        width: 100%;
        padding: 10px 12px;
        font-size: 14px;
        border: 1px solid #ddd;
        border-radius: 7px;
        margin-bottom: 10px;
        outline: none;
      }
      .modal input:focus {
        border-color: #4caf50;
      }
      .modal-submit {
        width: 100%;
        padding: 11px;
        font-size: 14px;
        font-weight: 600;
        color: white;
        border: none;
        border-radius: 7px;
        cursor: pointer;
        margin-top: 4px;
      }
      .modal-submit:disabled {
        background: #aaa;
        cursor: not-allowed;
      }
      .modal-submit-general {
        background: #4caf50;
      }
      .modal-submit-classrep {
        background: #ffa000;
      }
      .modal-submit-committee {
        background: #1976d2;
      }
      .modal-cancel {
        width: 100%;
        padding: 9px;
        font-size: 13px;
        color: #888;
        background: none;
        border: none;
        cursor: pointer;
        margin-top: 6px;
      }
      .modal-message {
        font-size: 13px;
        padding: 8px 10px;
        border-radius: 6px;
        margin-top: 8px;
      }
      .modal-message.success {
        background: #e8f5e9;
        color: #2e7d32;
      }
      .modal-message.error {
        background: #fdecea;
        color: #d32f2f;
        font-weight: 500;
      }

      .names-section {
        margin-bottom: 14px;
      }
      .names-role-group {
        margin-bottom: 8px;
      }
      .names-role-label {
        font-size: 11px;
        font-weight: 600;
        margin-bottom: 4px;
      }
      .names-role-label-general {
        color: #2e7d32;
      }
      .names-role-label-classrep {
        color: #f57f17;
      }
      .names-role-label-committee {
        color: #1565c0;
      }
      .names-chips {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
      }
      .name-chip {
        font-size: 11px;
        padding: 3px 9px;
        background: #f0f0f0;
        border-radius: 20px;
        color: #444;
      }
      /* Hint text */
      .slot-hint {
        font-size: 10px;
        color: #aaa;
        margin-top: 4px;
        font-style: italic;
      }

      /* Cancel tab */
      .modal-tabs {
        display: flex;
        border-bottom: 2px solid #e0e0e0;
        margin-bottom: 14px;
      }
      .modal-tab {
        flex: 1;
        padding: 8px;
        font-size: 13px;
        font-weight: 600;
        text-align: center;
        cursor: pointer;
        border-bottom: 2px solid transparent;
        margin-bottom: -2px;
        color: #aaa;
        background: none;
        border-top: none;
        border-left: none;
        border-right: none;
      }
      .modal-tab.active-signup {
        color: #2e7d32;
        border-bottom-color: #2e7d32;
      }
      .modal-tab.active-cancel {
        color: #c62828;
        border-bottom-color: #c62828;
      }

      .cancel-form {
        display: none;
      }
      .cancel-form.visible {
        display: block;
      }
      .cancel-select {
        width: 100%;
        padding: 10px 12px;
        font-size: 14px;
        border: 1px solid #ddd;
        border-radius: 7px;
        margin-bottom: 10px;
        background: white;
        color: #333;
        outline: none;
      }
      .cancel-submit {
        width: 100%;
        padding: 11px;
        font-size: 14px;
        font-weight: 600;
        background: #c62828;
        color: white;
        border: none;
        border-radius: 7px;
        cursor: pointer;
        margin-top: 4px;
      }
      .cancel-submit:disabled {
        background: #aaa;
        cursor: not-allowed;
      }

      /* Confirmation prompt */
      .confirm-box {
        background: #fdecea;
        border-radius: 8px;
        padding: 12px;
        margin-bottom: 10px;
        font-size: 13px;
        color: #c62828;
        line-height: 1.5;
      }
      .confirm-buttons {
        display: flex;
        gap: 8px;
        margin-top: 10px;
      }
      .confirm-yes {
        flex: 1;
        padding: 9px;
        font-size: 13px;
        font-weight: 600;
        background: #c62828;
        color: white;
        border: none;
        border-radius: 7px;
        cursor: pointer;
      }
      .confirm-no {
        flex: 1;
        padding: 9px;
        font-size: 13px;
        font-weight: 600;
        background: #f0f0f0;
        color: #333;
        border: none;
        border-radius: 7px;
        cursor: pointer;
      }
      .confirm-yes:disabled {
        background: #aaa;
        cursor: not-allowed;
        opacity: 0.6;
      }
      .confirm-no:disabled {
        background: #ccc;
        color: #999;
        cursor: not-allowed;
        opacity: 0.6;
      }
    </style>
  </head>
  <body>
    <h1 id="pageTitle"></h1>
    <div class="grid-wrapper">
      <table id="grid"></table>
    </div>

    <div class="modal-overlay" id="modalOverlay">
      <div class="modal">
        <div class="modal-title" id="modalTitle"></div>
        <div class="modal-subtitle" id="modalSubtitle"></div>

        <div class="names-section" id="namesSection" style="display: none">
          <div id="namesGroups"></div>
        </div>

        <div class="modal-tabs" id="modalTabs" style="display: none">
          <button class="modal-tab active-signup" id="tabSignup">
            登録する
          </button>
          <button class="modal-tab" id="tabCancel">キャンセルする</button>
        </div>

        <div class="role-buttons" id="roleButtons"></div>

        <div class="modal-form" id="modalForm">
          <input
            type="text"
            id="inputName"
            placeholder="保護者名"
            maxlength="10"
          />
          <input
            type="text"
            id="inputClass"
            placeholder="クラス"
            maxlength="10"
          />
          <input
            type="text"
            id="honeypot"
            name="email_confirm"
            autocomplete="off"
            tabindex="-1"
            aria-hidden="true"
            style="
              opacity: 0;
              position: absolute;
              top: 0;
              left: 0;
              height: 0;
              width: 0;
              z-index: -1;
            "
          />
          <button class="modal-submit" id="submitBtn"></button>
          <div
            class="modal-message"
            id="modalMessage"
            style="display: none"
          ></div>
        </div>

        <div class="cancel-form" id="cancelForm">
          <select class="cancel-select" id="cancelRole">
            <option value="">ポジションを選んでください</option>
          </select>
          <input
            type="text"
            id="cancelName"
            placeholder="保護者名"
            maxlength="10"
          />
          <input
            type="text"
            id="cancelClass"
            placeholder="クラス"
            maxlength="10"
          />
          <div class="confirm-box" id="confirmBox" style="display: none">
            <div id="confirmText"></div>
            <div class="confirm-buttons">
              <button class="confirm-yes" id="confirmYes">
                はい、キャンセルします。
              </button>
              <button class="confirm-no" id="confirmNo">いいえ</button>
            </div>
          </div>
          <button
            class="cancel-submit"
            id="cancelSubmitBtn"
            style="display: block"
          >
            登録を探す
          </button>
          <div
            class="modal-message"
            id="cancelMessage"
            style="display: none"
          ></div>
        </div>

        <button class="modal-cancel" id="closeBtn">閉じる</button>
      </div>
    </div>

    <script>
      function b64decode(str) {
        return decodeURIComponent(
          atob(str)
            .split("")
            .map(function (c) {
              return "%" + ("00" + c.charCodeAt(0).toString(16)).slice(-2);
            })
            .join(""),
        );
      }

      var EXEC_URL = "";
      var PAGE_LOAD_TIME = Date.now();
      var SIGNUP_BTN_TEXT = "登録する";
      var gridData = JSON.parse(b64decode("<?!= gridData ?>"));
      var alias = b64decode("<?!= alias ?>");
      var ROLES = JSON.parse(b64decode("<?!= roles ?>"));
      var PAGE_TITLE = b64decode("<?!= title ?>");
      var currentEventId = null;
      var currentRole = null;
      var currentTab = "signup";

      var ROLE_KEYS = [
        {
          key: "general",
          label: ROLES.general,
          btnClass: "role-btn-general",
          countClass: "count-general",
          labelClass: "names-role-label-general",
        },
        {
          key: "classRep",
          label: ROLES.classRep,
          btnClass: "role-btn-classrep",
          countClass: "count-classrep",
          labelClass: "names-role-label-classrep",
        },
        {
          key: "committee",
          label: ROLES.committee,
          btnClass: "role-btn-committee",
          countClass: "count-committee",
          labelClass: "names-role-label-committee",
        },
      ];

      function hasAnyAvailable(slots) {
        return ROLE_KEYS.some(function (r) {
          return slots[r.key].max > 0 && slots[r.key].filled < slots[r.key].max;
        });
      }

      function buildGrid() {
        if (!gridData || !gridData.events) {
          setTimeout(buildGrid, 200);
          return;
        }
        var table = document.getElementById("grid");
        if (!table) {
          setTimeout(buildGrid, 200);
          return;
        }

        var times = gridData.times;
        var activities = gridData.activities;
        var events = gridData.events;

        // Build header
        var thead = document.createElement("thead");
        var headerRow = document.createElement("tr");

        var timeHeader = document.createElement("th");
        timeHeader.className = "time-header";
        timeHeader.textContent = "Time";
        timeHeader.style.zIndex = "3";
        headerRow.appendChild(timeHeader);

        var descHeader = document.createElement("th");
        descHeader.className = "time-header";
        descHeader.textContent = "";
        descHeader.style.cssText =
          "max-width:120px;width:120px;word-wrap:break-word;overflow-wrap:break-word;white-space:normal;";
        headerRow.appendChild(descHeader);

        activities.forEach(function (a) {
          var th = document.createElement("th");
          var event = events.find(function (e) {
            return e.activity === a;
          });
          var actDiv = document.createElement("div");
          actDiv.style.cssText = "font-size:13px;font-weight:600;";
          actDiv.textContent = a;
          th.appendChild(actDiv);
          if (event && event.subtitle) {
            var personDiv = document.createElement("div");
            personDiv.style.cssText =
              "font-size:11px;font-weight:400;color:#888;margin-top:2px;";
            personDiv.textContent = event.subtitle;
            th.appendChild(personDiv);
          }
          headerRow.appendChild(th);
        });
        thead.appendChild(headerRow);

        // Build body
        var tbody = document.createElement("tbody");

        times.forEach(function (time) {
          var tr = document.createElement("tr");
          var matchedEvent = events.find(function (e) {
            return e.startTime === time;
          });

          var timeTd = document.createElement("td");
          timeTd.className = "time-cell";
          timeTd.textContent = formatTimeRange(
            time,
            matchedEvent ? matchedEvent.endTime : "",
          );
          tr.appendChild(timeTd);

          var descTd = document.createElement("td");
          descTd.className = "desc-cell";
          descTd.textContent = matchedEvent ? matchedEvent.description : "";
          tr.appendChild(descTd);

          activities.forEach(function (activity) {
            var td = document.createElement("td");
            var event = events.find(function (e) {
              return e.activity === activity && e.startTime === time;
            });

            if (!event) {
              var emptyDiv = document.createElement("div");
              emptyDiv.className = "slot slot-empty";
              td.appendChild(emptyDiv);
            } else {
              var slotDiv = document.createElement("div");
              var available = hasAnyAvailable(event.slots);

              if (!available) {
                slotDiv.className = "slot slot-all-full";
                slotDiv.setAttribute("data-eventid", event.eventId);
                var fullText = document.createElement("div");
                fullText.style.cssText =
                  "font-size:11px;color:#999;margin-bottom:4px;";
                fullText.textContent = "Full";
                slotDiv.appendChild(fullText);
              } else {
                slotDiv.className = "slot slot-mixed";
                slotDiv.setAttribute("data-eventid", event.eventId);
                ROLE_KEYS.forEach(function (r, idx) {
                  var s = event.slots[r.key];
                  if (s.max === 0) return;
                  if (idx > 0) {
                    var divider = document.createElement("hr");
                    divider.className = "role-divider";
                    slotDiv.appendChild(divider);
                  }
                  var roleRow = document.createElement("div");
                  roleRow.className = "role-row";
                  var roleLabel = document.createElement("span");
                  roleLabel.className = "role-label " + r.countClass;
                  roleLabel.textContent = r.label;
                  var roleCount = document.createElement("span");
                  roleCount.className = "role-count " + r.countClass;
                  var remaining = s.max - s.filled;
                  roleCount.textContent =
                    remaining <= 0 ? "Full" : remaining + " left";
                  roleRow.appendChild(roleLabel);
                  roleRow.appendChild(roleCount);
                  slotDiv.appendChild(roleRow);
                });
              }

              if (event.signups.length > 0) {
                var namesDiv = document.createElement("div");
                namesDiv.className = "slot-names";
                ROLE_KEYS.forEach(function (r) {
                  var roleSignups = event.signups.filter(function (s) {
                    return s.role === r.label;
                  });
                  if (roleSignups.length === 0) return;
                  var roleSpan = document.createElement("span");
                  roleSpan.className = r.countClass;
                  roleSpan.style.cssText = "font-size:10px;font-weight:500;";
                  roleSpan.textContent = roleSignups
                    .map(function (s) {
                      return s.name;
                    })
                    .join(", ");
                  namesDiv.appendChild(roleSpan);

                  // Add a line break between role groups if more than one role has signups
                  namesDiv.appendChild(document.createElement("br"));
                });
                slotDiv.appendChild(namesDiv);
                // Show hint text only when there are existing signups
                var hintDiv = document.createElement("div");
                hintDiv.className = "slot-hint";
                hintDiv.textContent = "登録、またはキャンセルする";
                slotDiv.appendChild(hintDiv);
              }

              td.appendChild(slotDiv);
            }
            tr.appendChild(td);
          });
          tbody.appendChild(tr);
        });

        while (table.firstChild) {
          table.removeChild(table.firstChild);
        }
        table.appendChild(thead);
        table.appendChild(tbody);
      }

      function formatTime(time) {
        if (!time) return "";
        var parts = time.split(":");
        var h = parseInt(parts[0]);
        var m = parts[1] || "00";
        var ampm = h >= 12 ? "pm" : "am";
        h = h % 12 || 12;
        return h + ":" + m + " " + ampm;
      }

      function formatTimeRange(startTime, endTime) {
        return formatTime(startTime) + " - " + formatTime(endTime);
      }

      function openModal(eventId) {
        if (!gridData || !gridData.events) {
          setTimeout(function () {
            openModal(eventId);
          }, 100);
          return;
        }
        var event = gridData.events.find(function (e) {
          return e.eventId == eventId;
        });
        if (!event) return;

        currentEventId = eventId;
        currentRole = null;

        document.getElementById("modalTitle").textContent = event.activity;
        var subtitle =
          formatTimeRange(event.startTime, event.endTime) +
          " — " +
          event.location;
        if (event.description && event.description.trim() !== "") {
          subtitle += " — " + event.description;
        }
        document.getElementById("modalSubtitle").textContent = subtitle;

        // Names grouped by role
        var namesSection = document.getElementById("namesSection");
        var namesGroups = document.getElementById("namesGroups");
        namesGroups.innerHTML = "";
        var hasAnySignups = false;
        ROLE_KEYS.forEach(function (r) {
          var roleSignups = event.signups.filter(function (s) {
            return s.role === r.label;
          });
          if (roleSignups.length === 0) return;
          hasAnySignups = true;
          var group = document.createElement("div");
          group.className = "names-role-group";
          var label = document.createElement("div");
          label.className = "names-role-label " + r.labelClass;
          label.textContent = r.label;
          group.appendChild(label);
          var chips = document.createElement("div");
          chips.className = "names-chips";
          roleSignups.forEach(function (s) {
            var chip = document.createElement("div");
            chip.className = "name-chip";
            chip.textContent = s.name;
            if (s.cls) {
              var clsSpan = document.createElement("span");
              clsSpan.style.cssText = "color:#888;font-size:10px;";
              clsSpan.textContent = " — " + s.cls;
              chip.appendChild(clsSpan);
            }
            chips.appendChild(chip);
          });
          group.appendChild(chips);
          namesGroups.appendChild(group);
        });
        namesSection.style.display = hasAnySignups ? "block" : "none";

        var roleButtons = document.getElementById("roleButtons");
        roleButtons.innerHTML = "";
        ROLE_KEYS.forEach(function (r) {
          var s = event.slots[r.key];
          if (s.max === 0) return;
          var btn = document.createElement("button");
          btn.className = "role-btn " + r.btnClass;
          btn.setAttribute("data-role", r.label);
          var remaining = s.max - s.filled;
          var isFull = remaining <= 0;
          if (isFull) {
            btn.classList.add("role-btn-full");
            btn.disabled = true;
          } else {
            btn.addEventListener("click", function () {
              selectRole(r.label, btn);
            });
          }
          var labelDiv = document.createElement("div");
          labelDiv.className = "role-btn-label";
          labelDiv.textContent = r.label;
          var countDiv = document.createElement("div");
          countDiv.className = "role-btn-count";
          countDiv.textContent = isFull
            ? "Full"
            : remaining + " spot" + (remaining > 1 ? "s" : "") + " left";
          btn.appendChild(labelDiv);
          btn.appendChild(countDiv);
          roleButtons.appendChild(btn);
        });

        var allFull = ROLE_KEYS.every(function (r) {
          var s = event.slots[r.key];
          return s.max === 0 || s.filled >= s.max;
        });
        if (allFull) {
          var fullMsg = document.createElement("div");
          fullMsg.style.cssText =
            "font-size:13px;color:#999;text-align:center;padding:8px 0;";
          fullMsg.textContent =
            "この枠はおかげさまで定員に達しました。ありがとうございます。";
          roleButtons.appendChild(fullMsg);
        }

        document.getElementById("modalForm").className = "modal-form";
        document.getElementById("inputName").value = "";
        document.getElementById("inputClass").value = "";
        document.getElementById("modalMessage").style.display = "none";
        document.getElementById("submitBtn").disabled = false;
        document.getElementById("submitBtn").textContent = SIGNUP_BTN_TEXT;

        var modalTabs = document.getElementById("modalTabs");
        modalTabs.style.display = event.signups.length > 0 ? "flex" : "none";

        currentTab = "signup";
        document.getElementById("tabSignup").className =
          "modal-tab active-signup";
        document.getElementById("tabCancel").className = "modal-tab";
        document.getElementById("cancelForm").className = "cancel-form";
        document.getElementById("cancelName").value = "";
        document.getElementById("cancelClass").value = "";
        document.getElementById("cancelMessage").style.display = "none";
        document.getElementById("confirmBox").style.display = "none";
        document.getElementById("confirmYes").disabled = false;
        document.getElementById("confirmYes").textContent =
          "はい、キャンセルします。";
        document.getElementById("confirmNo").disabled = false;
        document.getElementById("cancelSubmitBtn").style.display = "block";
        document.getElementById("cancelSubmitBtn").disabled = false;
        document.getElementById("cancelSubmitBtn").textContent = "登録を探す";

        document.getElementById("modalOverlay").classList.add("active");
        document.getElementById("inputName").focus();
      }

      function selectRole(roleLabel, btn) {
        currentRole = roleLabel;
        document.querySelectorAll(".role-btn").forEach(function (b) {
          b.classList.remove("selected");
        });
        btn.classList.add("selected");

        // Show form with matching submit button colour
        var modalForm = document.getElementById("modalForm");
        modalForm.className = "modal-form visible";
        var submitBtn = document.getElementById("submitBtn");
        submitBtn.className = "modal-submit";
        var roleKey = ROLE_KEYS.find(function (r) {
          return r.label === roleLabel;
        });
        if (roleKey) {
          submitBtn.classList.add(
            "modal-submit-" + roleKey.key.replace("classRep", "classrep"),
          );
        }
        submitBtn.textContent = SIGNUP_BTN_TEXT;
        document.getElementById("modalMessage").style.display = "none";
        document.getElementById("inputName").focus();
      }

      function closeModal() {
        document.getElementById("modalOverlay").classList.remove("active");
        document.getElementById("cancelForm").className = "cancel-form";
        document.getElementById("confirmBox").style.display = "none";
        document.getElementById("cancelMessage").style.display = "none";
        document.getElementById("cancelName").value = "";
        document.getElementById("cancelClass").value = "";
        document.getElementById("confirmYes").disabled = false;
        document.getElementById("confirmYes").textContent =
          "はい、キャンセルします。";
        document.getElementById("confirmNo").disabled = false;
        currentEventId = null;
        currentRole = null;
        currentTab = "signup";
        document.body.scrollTop = 0;
        document.documentElement.scrollTop = 0;
        var top = document.querySelector("h1");
        if (top) top.scrollIntoView({ behavior: "smooth" });
      }

      function switchTab(tab) {
        currentTab = tab;
        var roleButtons = document.getElementById("roleButtons");
        var modalForm = document.getElementById("modalForm");
        var cancelForm = document.getElementById("cancelForm");
        var tabSignup = document.getElementById("tabSignup");
        var tabCancel = document.getElementById("tabCancel");

        document.getElementById("confirmBox").style.display = "none";
        document.getElementById("cancelMessage").style.display = "none";
        document.getElementById("cancelSubmitBtn").style.display = "block";
        document.getElementById("cancelSubmitBtn").disabled = false;
        document.getElementById("cancelSubmitBtn").textContent = "登録を探す";
        document.getElementById("confirmYes").disabled = false;
        document.getElementById("confirmYes").textContent =
          "はい、キャンセルします。";
        document.getElementById("confirmNo").disabled = false;

        if (tab === "signup") {
          tabSignup.className = "modal-tab active-signup";
          tabCancel.className = "modal-tab";
          roleButtons.style.display = "block";
          modalForm.className = currentRole
            ? "modal-form visible"
            : "modal-form";
          cancelForm.className = "cancel-form";
        } else {
          tabSignup.className = "modal-tab";
          tabCancel.className = "modal-tab active-cancel";
          roleButtons.style.display = "none";
          modalForm.className = "modal-form";
          cancelForm.className = "cancel-form visible";
          var event = gridData.events.find(function (e) {
            return e.eventId == currentEventId;
          });
          var cancelRole = document.getElementById("cancelRole");
          cancelRole.innerHTML =
            '<option value="">ポジションを選んでください</option>';
          if (event) {
            ROLE_KEYS.forEach(function (r) {
              var roleSignups = event.signups.filter(function (s) {
                return s.role === r.label;
              });
              if (roleSignups.length > 0) {
                var opt = document.createElement("option");
                opt.value = r.label;
                opt.textContent = r.label;
                cancelRole.appendChild(opt);
              }
            });
          }
        }
      }

      function findAndConfirmCancel() {
        var name = document.getElementById("cancelName").value.trim();
        var cls = document.getElementById("cancelClass").value.trim();
        var role = document.getElementById("cancelRole").value;
        var msg = document.getElementById("cancelMessage");
        msg.style.display = "none";

        if (!role) {
          showCancelMessage("ポジションを選んでください", false);
          return;
        }
        if (!name) {
          showCancelMessage("名前を入力してください", false);
          return;
        }
        if (name.length > 10) {
          showCancelMessage("名前は１０文字内で入力してください", false);
          return;
        }
        if (!cls) {
          showCancelMessage("クラスを入力してください", false);
          return;
        }
        if (cls.length > 10) {
          showCancelMessage("クラスは１０文字内で入力してください。", false);
          return;
        }

        var event = gridData.events.find(function (e) {
          return e.eventId == currentEventId;
        });
        if (event) {
          var normName = name
            .toLowerCase()
            .replace(/[\s\u3000]+/g, " ")
            .trim();
          var normCls = cls
            .toLowerCase()
            .replace(/[\s\u3000]+/g, " ")
            .trim();
          var match = event.signups.find(function (s) {
            return (
              s.role === role &&
              s.name
                .toLowerCase()
                .replace(/[\s\u3000]+/g, " ")
                .trim() === normName &&
              s.cls
                .toLowerCase()
                .replace(/[\s\u3000]+/g, " ")
                .trim() === normCls
            );
          });
          if (!match) {
            showCancelMessage(
              "お名前とクラスの登録が見つかりません。入力内容をご確認ください。全角数字と半角数字にご注意ください。",
              false,
            );
            return;
          }
        }

        document.getElementById("confirmText").textContent =
          "本当にキャンセルしますか？";
        document.getElementById("confirmBox").style.display = "block";
        document.getElementById("cancelSubmitBtn").style.display = "none";
      }

      function confirmCancel() {
        var name = document.getElementById("cancelName").value.trim();
        var cls = document.getElementById("cancelClass").value.trim();
        var role = document.getElementById("cancelRole").value;
        var btn = document.getElementById("confirmYes");

        btn.disabled = true;
        btn.textContent = "キャンセル中...";
        document.getElementById("confirmNo").disabled = true;
        document.getElementById("cancelSubmitBtn").disabled = true;

        google.script.run
          .withSuccessHandler(function (result) {
            if (result.success) {
              showCancelMessage(result.message, true);
              setTimeout(function () {
                if (EXEC_URL) {
                  window.top.location.href = EXEC_URL;
                } else {
                  // Fallback
                  window.top.location.reload();
                }
              }, 1500);
            } else {
              showCancelMessage(result.message, false);
              btn.disabled = false;
              btn.textContent = "はい、キャンセルします。";
              document.getElementById("confirmNo").disabled = false;
              document.getElementById("cancelSubmitBtn").style.display =
                "block";
            }
          })
          .withFailureHandler(function (error) {
            showCancelMessage(
              "エラーが発生しました。再度試してください。",
              false,
            );
            btn.disabled = false;
            btn.textContent = "はい、キャンセルします。";
            document.getElementById("confirmNo").disabled = false;
            document.getElementById("cancelSubmitBtn").style.display = "block";
          })
          .cancelSignup(currentEventId, name, cls, role, alias);
      }

      function showCancelMessage(message, success) {
        var msgDiv = document.getElementById("cancelMessage");
        msgDiv.textContent = message;
        msgDiv.className = "modal-message " + (success ? "success" : "error");
        msgDiv.style.display = "block";
      }

      function submitSignup() {
        if (document.getElementById("honeypot").value !== "") return;
        // Reject submissions that arrive too quickly — likely automated
        if (Date.now() - PAGE_LOAD_TIME < 3000) {
          showModalMessage("少し待ってから送信してください。", false);
          return;
        }
        if (!currentRole) {
          showModalMessage("ポジションを選択してください。", false);
          return;
        }

        var name = document.getElementById("inputName").value.trim();
        var cls = document.getElementById("inputClass").value.trim();
        var btn = document.getElementById("submitBtn");

        if (!name) {
          showModalMessage("名前を入力してください。", false);
          return;
        }
        if (name.length > 10) {
          showModalMessage("名前は１０文字以下で入力してください。", false);
          return;
        }
        if (!/^[\p{L}\p{N}\s\-'.]+$/u.test(name)) {
          showModalMessage("名前に不正な文字が含まれています。", false);
          return;
        }
        if (!cls) {
          showModalMessage("クラスを入力してください。", false);
          return;
        }
        if (cls.length > 10) {
          showModalMessage("クラスは１０文字以下で入力してください。", false);
          return;
        }
        if (!/^[\p{L}\p{N}\s\-'.]+$/u.test(cls)) {
          showModalMessage("クラス名に不正な文字が含まれています。", false);
          return;
        }

        btn.disabled = true;
        btn.textContent = "送信中...";
        document.getElementById("modalMessage").style.display = "none";

        google.script.run
          .withSuccessHandler(function (result) {
            showModalMessage(result.message, result.success);
            if (result.success) {
              var event = gridData.events.find(function (e) {
                return e.eventId == currentEventId;
              });
              if (event) {
                event.signups.push({ name: name, cls: cls, role: currentRole });
                var roleKey = ROLE_KEYS.find(function (r) {
                  return r.label === currentRole;
                });
                if (roleKey) event.slots[roleKey.key].filled++;
              }
              buildGrid();
              setTimeout(closeModal, 1500);
            } else {
              btn.disabled = false;
              btn.textContent = SIGNUP_BTN_TEXT;
            }
          })
          .withFailureHandler(function (error) {
            showModalMessage("問題が発生しました。再度試してください。", false);
            btn.disabled = false;
            btn.textContent = SIGNUP_BTN_TEXT;
          })
          .submitSignup(currentEventId, name, cls, currentRole, alias);
      }

      function showModalMessage(message, success) {
        var msgDiv = document.getElementById("modalMessage");
        msgDiv.textContent = message;
        msgDiv.className = "modal-message " + (success ? "success" : "error");
        msgDiv.style.display = "block";
      }

      document
        .getElementById("modalOverlay")
        .addEventListener("click", function (e) {
          if (e.target === this) closeModal();
        });
      document.getElementById("closeBtn").addEventListener("click", closeModal);
      document
        .getElementById("tabSignup")
        .addEventListener("click", function () {
          switchTab("signup");
        });
      document
        .getElementById("tabCancel")
        .addEventListener("click", function () {
          switchTab("cancel");
        });
      document
        .getElementById("cancelSubmitBtn")
        .addEventListener("click", function (e) {
          e.stopPropagation();
          findAndConfirmCancel();
        });
      document
        .getElementById("confirmYes")
        .addEventListener("click", function (e) {
          e.stopPropagation();
          confirmCancel();
        });
      document
        .getElementById("confirmNo")
        .addEventListener("click", function () {
          document.getElementById("confirmBox").style.display = "none";
          document.getElementById("cancelSubmitBtn").style.display = "block";
        });
      document
        .getElementById("submitBtn")
        .addEventListener("click", submitSignup);
      document
        .getElementById("inputName")
        .addEventListener("keydown", function (e) {
          if (e.key === "Enter") submitSignup();
        });
      document
        .getElementById("inputClass")
        .addEventListener("keydown", function (e) {
          if (e.key === "Enter") submitSignup();
        });

      document
        .querySelector(".grid-wrapper")
        .addEventListener("click", function (e) {
          var slot = e.target.closest("[data-eventid]");
          if (slot) {
            openModal(slot.getAttribute("data-eventid"));
          }
        });

      document.getElementById("pageTitle").textContent = PAGE_TITLE;

      google.script.run
        .withSuccessHandler(function (url) {
          EXEC_URL = url + "?event=" + alias;
        })
        .getDeployedUrl();

      buildGrid();
    </script>
